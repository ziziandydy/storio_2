name: Renew Apple Sign-In Secret Key

on:
  schedule:
    # 每 5 個月執行一次（1月、6月、11月的1日 UTC 00:00）
    - cron: '0 0 1 1,6,11 *'
  workflow_dispatch: # 允許手動觸發

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Generate new Apple client_secret JWT
        id: generate_jwt
        run: |
          node - <<'EOF'
          const crypto = require('crypto');

          const teamId = process.env.APPLE_TEAM_ID;
          const keyId = process.env.APPLE_KEY_ID;
          const clientId = process.env.APPLE_CLIENT_ID;
          const privateKey = process.env.APPLE_P8_KEY;

          const header = Buffer.from(JSON.stringify({ alg: 'ES256', kid: keyId })).toString('base64url');
          const now = Math.floor(Date.now() / 1000);
          const payload = Buffer.from(JSON.stringify({
            iss: teamId,
            iat: now,
            exp: now + 15552000, // 180 天
            aud: 'https://appleid.apple.com',
            sub: clientId,
          })).toString('base64url');

          const sign = crypto.createSign('sha256');
          sign.update(header + '.' + payload);
          const sig = sign.sign({ key: privateKey, dsaEncoding: 'ieee-p1363' }).toString('base64url');
          const jwt = header + '.' + payload + '.' + sig;

          // 輸出供後續步驟使用
          require('fs').appendFileSync(process.env.GITHUB_OUTPUT, `jwt=${jwt}\n`);
          console.log('JWT generated, length:', jwt.length);
          EOF
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          APPLE_P8_KEY: ${{ secrets.APPLE_P8_KEY }}

      - name: Update Supabase Dev project
        run: |
          curl -s -X PATCH \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_DEV_PROJECT_REF }}/config/auth" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"external_apple_secret\": \"${{ steps.generate_jwt.outputs.jwt }}\"}" \
            | jq '{external_apple_enabled, external_apple_client_id}'

      - name: Update Supabase Prod project
        run: |
          curl -s -X PATCH \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROD_PROJECT_REF }}/config/auth" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"external_apple_secret\": \"${{ steps.generate_jwt.outputs.jwt }}\"}" \
            | jq '{external_apple_enabled, external_apple_client_id}'
