name: Backend Tests

# 發版安全網：後端 pytest 在 push 與 PR 時自動執行。
# 現有 36 個測試以 mock（MagicMock/AsyncMock）為主，不連真實 Supabase，
# 因此 CI 僅需 dummy env 讓 app 通過 startup validation 即可。

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'server/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    env:
      # Dummy 憑證：僅供 app.main 的 startup validation 通過。
      # 測試全程使用 mock，不會發出真實 Supabase / TMDB 請求。
      SUPABASE_URL: https://dummy.supabase.co
      SUPABASE_ANON_KEY: dummy-anon-key
      SUPABASE_SERVICE_KEY: dummy-service-key
      TMDB_API_KEY: dummy-tmdb-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest -q --no-header
